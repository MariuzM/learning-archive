<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        margin-top: 4rem;
      }
      #status {
        font-size: 1.25rem;
        height: 1.5rem;
      }
      #board {
        display: grid;
        grid-template-columns: repeat(3, 5rem);
        grid-template-rows: repeat(3, 5rem);
        gap: 4px;
        background: #222;
        padding: 4px;
      }
      [data-cell] {
        background: #fff;
        border: none;
        font-size: 2.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-cell].taken {
        cursor: not-allowed;
      }
      [data-cell].win {
        background: #b6f0c0;
      }
      #reset {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="status"></div>
    <div id="board">
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
      <button data-cell></button>
    </div>
    <button id="reset">Reset</button>
    <script src="game.js"></script>
  </body>
</html>

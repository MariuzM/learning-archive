<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Single Page App</title>
	<link rel="stylesheet" href="css/style.css">
	<script defer src="https://cdnjs.cloudflare.com/ajax/libs/animejs/2.2.0/anime.min.js"></script>
</head>

<body>

	<div class="block">
		<header>
			<div class="hero">
				<img src="./img/cover.jpg" alt="">
			</div>
		</header>


		<section>

			<div class="d-wrap">
				<div class="detail">
					<span class="detail-title">Length</span>
					<span class="detail-content">2h 14min</span>
				</div>

				<div class="sep"></div>

				<div class="detail">
					<span class="detail-title">Language</span>
					<span class="detail-content">English</span>
				</div>

				<div class="sep"></div>

				<div class="detail">
					<span class="detail-title">Rating</span>
					<span class="detail-content">PG-13</span>
				</div>
			</div>

			<div class="g-wrap">
				<div class="title">Gallery</div>
				<div class="gallery">
					<img src="./img/gal1.jpg">
					<img src="./img/gal2.jpg">
					<img src="./img/gal3.jpg">
				</div>
			</div>

		</section>

	</div>

	<nav>


	</nav>

</body>

</html>
